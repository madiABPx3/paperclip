databases:
  - name: paperclip-db
    plan: free
    databaseName: paperclip
    user: paperclip
    postgresMajorVersion: "16"
    ipAllowList: []

services:
  - type: web
    name: paperclip-server
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    numInstances: 1
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: paperclip-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: "3100"
      - key: SERVE_UI
        value: "true"
      - key: PAPERCLIP_MIGRATION_AUTO_APPLY
        value: "true"
      - key: HEARTBEAT_SCHEDULER_ENABLED
        value: "false"
